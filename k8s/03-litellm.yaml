apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ember-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
      - name: litellm
        image: ghcr.io/berriai/litellm:main-latest
        args: ["--config", "/app/config.yaml"]
        ports:
        - containerPort: 4000
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: LITELLM_MASTER_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: DATABASE_URL
        - name: STORE_MODEL_IN_DB
          value: "True"
        - name: REDIS_HOST
          value: "valkey-svc"
        - name: REDIS_PORT
          value: "6379"
        # -----------------------------------------------------------------
        # Keycloak SSO (OIDC) — LiteLLM Generic OAuth2 Provider
        # -----------------------------------------------------------------
        - name: GENERIC_AUTHORIZATION_ENDPOINT
          value: "https://<KEYCLOAK_HOST>/realms/<REALM>/protocol/openid-connect/auth"
        - name: GENERIC_TOKEN_ENDPOINT
          value: "https://<KEYCLOAK_HOST>/realms/<REALM>/protocol/openid-connect/token"
        - name: GENERIC_USERINFO_ENDPOINT
          value: "https://<KEYCLOAK_HOST>/realms/<REALM>/protocol/openid-connect/userinfo"
        - name: GENERIC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: KEYCLOAK_CLIENT_ID
        - name: GENERIC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ember-ai-env-secrets
              key: KEYCLOAK_CLIENT_SECRET
        volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config

---
apiVersion: v1
kind: Service
metadata:
  name: litellm-svc
  namespace: ember-ai
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: 4000
  selector:
    app: litellm
