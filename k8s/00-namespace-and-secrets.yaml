apiVersion: v1
kind: Namespace
metadata:
  name: ember-ai

---
# =============================================================================
# Manual bootstrap secret — replace with ESO-managed secret once Ember-AI-sos
# bead is completed (Install External Secrets Operator).
#
# IMPORTANT: Real values stored in GitHub Secrets:
#   Ember-AI secrets (embernet/Ember-AI):
#     EMBER_POSTGRES_USER, EMBER_POSTGRES_PASSWORD,
#     EMBER_LITELLM_MASTER_KEY, EMBER_DATABASE_URL
#   OpenZiti / EmberNet Flux secrets (embernet org, "emberflux"):
#     ZITI_IDENTITY_JSON (the enrolled identity JSON for the Edge Tunnel)
#
# For local dev, inject via deploy.ps1 or:
#   kubectl create secret generic ember-ai-env-secrets -n ember-ai \
#     --from-literal=POSTGRES_USER=... --from-literal=POSTGRES_PASSWORD=...
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ember-ai-env-secrets
  namespace: ember-ai
type: Opaque
stringData:
  POSTGRES_USER: "REPLACE_VIA_GITHUB_SECRETS"
  POSTGRES_PASSWORD: "REPLACE_VIA_GITHUB_SECRETS"
  LITELLM_MASTER_KEY: "REPLACE_VIA_GITHUB_SECRETS"
  DATABASE_URL: "REPLACE_VIA_GITHUB_SECRETS"
  # Source: embernet org → emberflux GitHub Secrets
  ZITI_IDENTITY_JSON: "REPLACE_VIA_EMBERFLUX_SECRETS"

