apiVersion: v1
kind: Namespace
metadata:
  name: ember-ai

---
# =============================================================================
# Manual bootstrap secret — replace with ESO-managed secret once ESO is
# installed and the Bitwarden ClusterSecretStore is configured.
#
# IMPORTANT: Real values stored in GitHub Secrets (embernet/Ember-AI):
#   Core:     POSTGRES_USER, POSTGRES_PASSWORD, LITELLM_MASTER_KEY, DATABASE_URL
#   SSO:      KEYCLOAK_CLIENT_ID, KEYCLOAK_CLIENT_SECRET
#   LLM:      DEEPINFRA_API_KEY, NVIDIA_API_KEY, OPENAI_API_KEY,
#             ANTHROPIC_API_KEY, GEMINI_API_KEY
#   Network:  ZITI_IDENTITY_JSON (embernet org → emberflux)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ember-ai-env-secrets
  namespace: ember-ai
type: Opaque
stringData:
  # --- Core ---
  POSTGRES_USER: "REPLACE_VIA_SECRETS"
  POSTGRES_PASSWORD: "REPLACE_VIA_SECRETS"
  LITELLM_MASTER_KEY: "REPLACE_VIA_SECRETS"
  DATABASE_URL: "REPLACE_VIA_SECRETS"
  # --- SSO ---
  KEYCLOAK_CLIENT_ID: "REPLACE_VIA_SECRETS"
  KEYCLOAK_CLIENT_SECRET: "REPLACE_VIA_SECRETS"
  # --- LLM Provider API Keys ---
  DEEPINFRA_API_KEY: "REPLACE_VIA_SECRETS"
  NVIDIA_API_KEY: "REPLACE_VIA_SECRETS"
  OPENAI_API_KEY: "REPLACE_VIA_SECRETS"
  ANTHROPIC_API_KEY: "REPLACE_VIA_SECRETS"
  GEMINI_API_KEY: "REPLACE_VIA_SECRETS"
  # --- Network (embernet org → emberflux) ---
  ZITI_IDENTITY_JSON: "REPLACE_VIA_SECRETS"
