apiVersion: v1
kind: Namespace
metadata:
  name: ember-ai
---
# Bitwarden Secrets Manager - SecretProviderClass (Example for CSI driver or External Secrets Operator)
# Note: This assumes the Bitwarden Kubernetes native integration or External Secrets Operator is installed in the K3s cluster.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: bitwarden-sm
  namespace: ember-ai
spec:
  provider:
    webhook:
      # Placeholder for Bitwarden Secrets Manager fetching webhook or native integration
      url: "http://bitwarden-operator.bitwarden.svc.cluster.local/v1/secrets"

---
# ExternalSecret defining how to fetch the master secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ember-ai-secrets
  namespace: ember-ai
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-sm
    kind: SecretStore
  target:
    name: ember-ai-env-secrets # Automatically created Secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: postgres-user # Name of the secret in Bitwarden
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: postgres-password
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: litellm-master-key
    - secretKey: TWINGATE_NETWORK
      remoteRef:
        key: twingate-network
    - secretKey: TWINGATE_ACCESS_TOKEN
      remoteRef:
        key: twingate-access-token
    - secretKey: TWINGATE_REFRESH_TOKEN
      remoteRef:
        key: twingate-refresh-token
    - secretKey: KEYCLOAK_CLIENT_ID
      remoteRef:
        key: keycloak-client-id
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: keycloak-client-secret
