# =============================================================================
# Bitwarden Secrets Manager — ClusterSecretStore for ESO
#
# Prerequisites:
#   1. External Secrets Operator must be running (06-external-secrets-operator.yaml)
#   2. Create a bootstrap secret with your BW access token:
#      kubectl create secret generic bw-access-token \
#        -n external-secrets \
#        --from-literal=token=<YOUR_BITWARDEN_ACCESS_TOKEN>
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: bitwarden-sm
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      auth:
        secretRef:
          credentials:
            name: bw-access-token
            namespace: external-secrets
            key: token

---
# =============================================================================
# ExternalSecret — pulls Ember AI secrets from Bitwarden SM
# Maps Bitwarden secret IDs to K8s secret keys.
# Replace <BW_SECRET_ID_*> placeholders with your actual Bitwarden secret UUIDs.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ember-ai-secrets
  namespace: ember-ai
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-sm
    kind: ClusterSecretStore
  target:
    name: ember-ai-env-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: "<BW_SECRET_ID_POSTGRES_USER>"
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: "<BW_SECRET_ID_POSTGRES_PASSWORD>"
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: "<BW_SECRET_ID_LITELLM_MASTER_KEY>"
    - secretKey: DATABASE_URL
      remoteRef:
        key: "<BW_SECRET_ID_DATABASE_URL>"
    - secretKey: KEYCLOAK_CLIENT_ID
      remoteRef:
        key: "<BW_SECRET_ID_KEYCLOAK_CLIENT_ID>"
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: "<BW_SECRET_ID_KEYCLOAK_CLIENT_SECRET>"
    # OpenZiti identity sourced from embernet org → emberflux
    - secretKey: ZITI_IDENTITY_JSON
      remoteRef:
        key: "<BW_SECRET_ID_ZITI_IDENTITY>"
