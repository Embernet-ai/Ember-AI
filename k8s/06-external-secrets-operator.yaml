# =============================================================================
# External Secrets Operator — installed via K3s HelmChart CRD
# This uses K3s's built-in Helm controller, no separate Helm binary needed.
# =============================================================================
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: external-secrets
  namespace: kube-system
spec:
  repo: https://charts.external-secrets.io
  chart: external-secrets
  version: "0.12.1"
  targetNamespace: external-secrets
  createNamespace: true
  valuesContent: |-
    installCRDs: true
    webhook:
      port: 9443
    certController:
      enabled: true
